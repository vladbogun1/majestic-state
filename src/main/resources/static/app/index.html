<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Discord Report Bot - Панель</title>
    <style>
        :root {
            --bg: #0f1117;
            --panel: #181c26;
            --panel-soft: #1f2431;
            --accent: #7d87ff;
            --accent-strong: #b678ff;
            --text: #f5f5f5;
            --muted: #9aa3b2;
        }
        body {
            margin: 0;
            background: var(--bg);
            font-family: "Inter", sans-serif;
            color: var(--text);
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 40px;
            background: var(--panel);
            border-bottom: 1px solid #242b3a;
        }
        header h1 {
            margin: 0;
            font-size: 20px;
        }
        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            padding: 24px 40px 40px;
        }
        .card {
            background: var(--panel);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            margin: 0 0 12px;
            font-size: 16px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #2c3547;
            background: var(--panel-soft);
            color: var(--text);
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        button {
            margin-top: 12px;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(90deg, var(--accent), var(--accent-strong));
            color: #fff;
        }
        button.secondary {
            background: #2a3244;
        }
        button.ghost {
            background: transparent;
            border: 1px solid #2c3547;
        }
        .section-list {
            margin-top: 12px;
            display: grid;
            gap: 12px;
        }
        .section-item {
            background: #1c2130;
            border-radius: 12px;
            padding: 12px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .tag {
            background: #2e3650;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
        }
        .reports {
            display: grid;
            gap: 12px;
            margin-top: 12px;
        }
        .report-row {
            background: #1c2130;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .report-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .muted {
            color: var(--muted);
            font-size: 12px;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .inline {
            display: flex;
            gap: 10px;
        }
        .inline > * {
            flex: 1;
        }
        .divider {
            height: 1px;
            background: #252c3b;
            margin: 16px 0;
        }
        .pill {
            display: inline-block;
            background: #222a3c;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<header>
    <h1>Discord Report Bot</h1>
    <form id="logoutForm">
        <button class="ghost" type="submit">Выйти</button>
    </form>
</header>

<div class="layout">
    <div class="card">
        <h2>Администраторы</h2>
        <div id="adminList" class="muted">Загрузка...</div>
        <div class="divider"></div>
        <form id="createAdminForm">
            <label>Новый логин
                <input type="text" name="username" required>
            </label>
            <label>Пароль
                <input type="password" name="password" required>
            </label>
            <button type="submit">Добавить администратора</button>
            <div class="muted" id="adminCreateStatus"></div>
        </form>
        <div class="divider"></div>
        <form id="changePasswordForm">
            <label>Текущий пароль
                <input type="password" name="currentPassword" required>
            </label>
            <label>Новый пароль
                <input type="password" name="newPassword" required>
            </label>
            <button type="submit" class="secondary">Сменить пароль</button>
            <div class="muted" id="passwordStatus"></div>
        </form>
    </div>

    <div class="card">
        <h2>Конструктор отчётов</h2>
        <form id="reportForm">
            <div class="inline">
                <label>Название
                    <input type="text" name="name" required>
                </label>
                <label>Интервал (мин.)
                    <input type="number" name="intervalMinutes" min="1" value="60" required>
                </label>
            </div>
            <label>Discord сервер
                <select name="guildId" id="guildSelect" required></select>
            </label>
            <label>Канал для отчёта
                <select name="channelId" id="channelSelect" required></select>
            </label>
            <div class="inline">
                <label>Показывать роль
                    <select name="showRoleName" id="showRoleName">
                        <option value="true">Да</option>
                        <option value="false">Нет</option>
                    </select>
                </label>
                <label>Показывать ID
                    <select name="showUserId" id="showUserId">
                        <option value="true">Да</option>
                        <option value="false">Нет</option>
                    </select>
                </label>
                <label>Показывать упоминание
                    <select name="showMention" id="showMention">
                        <option value="true">Да</option>
                        <option value="false">Нет</option>
                    </select>
                </label>
            </div>

            <div class="divider"></div>
            <h3>Секции отчёта</h3>
            <div class="section-list" id="sectionList"></div>
            <button type="button" id="addSectionBtn" class="secondary">Добавить секцию</button>

            <div class="divider"></div>
            <label>
                <input type="checkbox" id="enabled" checked>
                Включен
            </label>
            <button type="submit">Сохранить отчёт</button>
            <div class="muted" id="reportStatus"></div>
        </form>

        <div class="divider"></div>
        <h2>Активные отчёты</h2>
        <div class="reports" id="reportList"></div>
    </div>
</div>

<script>
    const guildSelect = document.getElementById('guildSelect');
    const channelSelect = document.getElementById('channelSelect');
    const sectionList = document.getElementById('sectionList');
    let roleCache = {};
    let editingReportId = null;

    async function ensureAuth() {
        const response = await fetch('/api/session');
        const data = await response.json();
        if (!data.authenticated) {
            window.location.href = '/login.html';
        }
    }

    async function loadAdmins() {
        const response = await fetch('/api/admins');
        const admins = await response.json();
        const list = admins.map(admin => `<div class="pill">${admin.username}</div>`).join(' ');
        document.getElementById('adminList').innerHTML = list || '<span class="muted">Нет администраторов</span>';
    }

    async function loadGuilds() {
        const response = await fetch('/api/discord/guilds');
        const guilds = await response.json();
        guildSelect.innerHTML = guilds.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
        if (guilds.length) {
            await loadChannels(guilds[0].id);
            await loadRoles(guilds[0].id);
        }
    }

    async function loadChannels(guildId) {
        const response = await fetch(`/api/discord/guilds/${guildId}/channels`);
        const channels = await response.json();
        channelSelect.innerHTML = channels.map(c => `<option value="${c.id}">#${c.name}</option>`).join('');
    }

    async function loadRoles(guildId) {
        const response = await fetch(`/api/discord/guilds/${guildId}/roles`);
        const roles = await response.json();
        roleCache[guildId] = roles;
        updateRoleSelectors();
    }

    function updateRoleSelectors() {
        const guildId = guildSelect.value;
        const roles = roleCache[guildId] || [];
        document.querySelectorAll('.roleSelect').forEach(select => {
            const selected = new Set(Array.from(select.selectedOptions).map(opt => opt.value));
            select.innerHTML = roles.map(role => {
                const isSelected = selected.has(role.id) ? 'selected' : '';
                return `<option value="${role.id}" ${isSelected}>${role.name}</option>`;
            }).join('');
        });
    }

    function createSection(data = {}) {
        const section = document.createElement('div');
        section.className = 'section-item';
        section.innerHTML = `
            <label>Название секции
                <input type="text" class="sectionTitle" value="${data.title || ''}" required>
            </label>
            <label>Роли для секции
                <select class="roleSelect" multiple size="6"></select>
            </label>
            <button type="button" class="ghost removeSection">Удалить секцию</button>
        `;
        section.querySelector('.removeSection').addEventListener('click', () => section.remove());
        sectionList.appendChild(section);
        updateRoleSelectors();
        if (data.roleIds) {
            const select = section.querySelector('.roleSelect');
            Array.from(select.options).forEach(option => {
                option.selected = data.roleIds.includes(option.value);
            });
        }
    }

    async function loadReports() {
        const response = await fetch('/api/reports');
        const reports = await response.json();
        const list = document.getElementById('reportList');
        list.innerHTML = '';
        reports.forEach(report => {
            const row = document.createElement('div');
            row.className = 'report-row';
            row.innerHTML = `
                <div class="report-meta">
                    <strong>${report.name}</strong>
                    <span class="muted">${report.guildId} → ${report.channelId}</span>
                    <span class="muted">Интервал: ${report.intervalMinutes} мин • ${report.enabled ? 'Вкл' : 'Выкл'}</span>
                </div>
                <div class="actions">
                    <button class="secondary" data-action="edit">Редактировать</button>
                    <button class="ghost" data-action="run">Запуск</button>
                    <button class="ghost" data-action="delete">Удалить</button>
                </div>
            `;
            row.querySelector('[data-action="run"]').addEventListener('click', async () => {
                await fetch(`/api/reports/${report.id}/run`, { method: 'POST' });
            });
            row.querySelector('[data-action="delete"]').addEventListener('click', async () => {
                await fetch(`/api/reports/${report.id}`, { method: 'DELETE' });
                await loadReports();
            });
            row.querySelector('[data-action="edit"]').addEventListener('click', async () => {
                editingReportId = report.id;
                populateReportForm(report);
            });
            list.appendChild(row);
        });
    }

    function populateReportForm(report) {
        document.querySelector('[name="name"]').value = report.name;
        document.querySelector('[name="intervalMinutes"]').value = report.intervalMinutes;
        guildSelect.value = report.guildId;
        document.getElementById('enabled').checked = report.enabled;
        loadChannels(report.guildId).then(() => {
            channelSelect.value = report.channelId;
        });
        loadRoles(report.guildId).then(() => {
            sectionList.innerHTML = '';
            const sections = JSON.parse(report.rulesJson);
            sections.forEach(section => createSection(section));
        });
        const format = JSON.parse(report.formatJson);
        document.getElementById('showRoleName').value = String(format.showRoleName);
        document.getElementById('showUserId').value = String(format.showUserId);
        document.getElementById('showMention').value = String(format.showMention);
    }

    document.getElementById('addSectionBtn').addEventListener('click', () => createSection());

    guildSelect.addEventListener('change', async () => {
        await loadChannels(guildSelect.value);
        await loadRoles(guildSelect.value);
    });

    document.getElementById('reportForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const status = document.getElementById('reportStatus');
        status.textContent = '';
        const sections = Array.from(document.querySelectorAll('.section-item')).map(section => ({
            title: section.querySelector('.sectionTitle').value,
            roleIds: Array.from(section.querySelector('.roleSelect').selectedOptions).map(opt => opt.value)
        }));
        const payload = {
            name: document.querySelector('[name="name"]').value,
            guildId: guildSelect.value,
            channelId: channelSelect.value,
            intervalMinutes: Number(document.querySelector('[name="intervalMinutes"]').value),
            enabled: document.getElementById('enabled').checked,
            sections,
            format: {
                showRoleName: document.getElementById('showRoleName').value === 'true',
                showUserId: document.getElementById('showUserId').value === 'true',
                showMention: document.getElementById('showMention').value === 'true'
            }
        };
        const method = editingReportId ? 'PUT' : 'POST';
        const url = editingReportId ? `/api/reports/${editingReportId}` : '/api/reports';
        const response = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (response.ok) {
            status.textContent = 'Сохранено!';
            editingReportId = null;
            event.target.reset();
            sectionList.innerHTML = '';
            createSection();
            await loadReports();
        } else {
            status.textContent = 'Ошибка сохранения';
        }
    });

    document.getElementById('createAdminForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const status = document.getElementById('adminCreateStatus');
        status.textContent = '';
        const payload = Object.fromEntries(new FormData(event.target));
        const response = await fetch('/api/admins', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        status.textContent = response.ok ? 'Администратор создан' : 'Ошибка создания';
        if (response.ok) {
            event.target.reset();
            await loadAdmins();
        }
    });

    document.getElementById('changePasswordForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const status = document.getElementById('passwordStatus');
        status.textContent = '';
        const payload = Object.fromEntries(new FormData(event.target));
        const response = await fetch('/api/admins/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        status.textContent = response.ok ? 'Пароль обновлён' : 'Ошибка смены пароля';
        if (response.ok) {
            event.target.reset();
        }
    });

    document.getElementById('logoutForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/login.html';
    });

    async function init() {
        await ensureAuth();
        await loadAdmins();
        await loadGuilds();
        createSection();
        await loadReports();
    }

    init();
</script>
</body>
</html>
